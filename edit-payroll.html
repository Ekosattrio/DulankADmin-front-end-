<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
	<meta name="description" content="POS - Bootstrap Admin Template">
	<meta name="keywords"
		content="admin, estimates, bootstrap, business, corporate, creative, invoice, html5, responsive, Projects">
	<meta name="author" content="Dreamguys - Bootstrap Admin Template">
	<meta name="robots" content="noindex, nofollow">
	<title>Dreams Pos Admin Template</title>

	<!-- Favicon -->
	<link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon.png">

	<!-- Bootstrap CSS -->
	<link rel="stylesheet" href="assets/css/bootstrap.min.css">

	<!-- animation CSS -->
	<link rel="stylesheet" href="assets/css/animate.css">

	<!-- Select2 CSS -->
	<link rel="stylesheet" href="assets/plugins/select2/css/select2.min.css">

	<!-- Datetimepicker CSS -->
	<link rel="stylesheet" href="assets/css/bootstrap-datetimepicker.min.css">

	<!-- Datatable CSS -->
	<link rel="stylesheet" href="assets/css/dataTables.bootstrap5.min.css">

	<!-- Fontawesome CSS -->
	<link rel="stylesheet" href="assets/plugins/fontawesome/css/fontawesome.min.css">
	<link rel="stylesheet" href="assets/plugins/fontawesome/css/all.min.css">

	<!-- Main CSS -->
	<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

	<div id="global-loader">
		<div class="whirly-loader"> </div>
	</div>

	<!-- Main Wrapper -->
	<div class="main-wrapper">

		<!-- header -->
		<div id="header-placeholder"></div>
		<!-- sidebar -->
		<div id="sidebar-placeholder"></div>

		<div class="page-wrapper">
			<div class="content mt-4">
				<div class="page-header">
					<div class="add-item d-flex">
						<div class="page-title">
							<h4>Edit Payroll</h4>
						</div>
					</div>
				</div>
				<!-- /product list -->
				<form action="add-payroll.html">
					<div class="card">
						<div class="card-body">
							<!-- Employee Information Section -->
							<div class="payroll-field">
								<div class="card-title-head">
									<h6><span><i data-feather="info" class="feather-edit"></i></span>Employee
										Information</h6>
								</div>
								<div class="row">
									<div class="col-md-6">
										<div class="mb-3">
											<label class="form-label">Select Employee</label>
											<div class="search-container">
												<input type="text" class="form-control customer-input"
													placeholder="Search Employee" value="Budi Setiadi">
												<div class="search-results"></div>
											</div>
										</div>
									</div>
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Salary</label>
											<input type="text" class="form-control" value="150.000" disabled>
										</div>
									</div>
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">System</label>
											<input type="text" class="form-control" value="Daily" disabled>
										</div>
									</div>
									<div class="col-md-6">
										<div class="mb-3">
											<label class="form-label">Periode</label>
											<div class="pemilihrentang-container ">
												<input type="text" id="pemilihrentang-input"
													class="pemilihrentang-input form-control" readonly
													placeholder="Select Date Range" value="01/12/2025 - 07/12/2025"
													style="height: fit-content !important;width: 100% !important;">
												<div id="pemilihrentang-panel" class="pemilihrentang-panel">
													<div class="pemilihrentang-isi">
														<div class="opsi-cepat">
															<div data-range="kemarin">Kemarin</div>
															<div data-range="7hari">7 Hari Terakhir</div>
															<div data-range="bulanIni">Bulan Ini</div>
															<div data-range="bulanLalu">Bulan Lalu</div>
															<div data-range="tahunLalu">Tahun Lalu</div>
															<div data-range="kustom">Rentang Kustom</div>
														</div>
														<div class="kalender" id="kalender-view" style="display:none;">
														</div>
													</div>
												</div>
											</div>
										</div>
									</div>
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Worked Day</label>
											<input type="text" class="form-control number-separator" inputmode="numeric"
												pattern="[0-9]*" value="6">
											<input type="hidden" class="result-input" id="worked-day" value="6">
										</div>
									</div>
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Absent Day</label>
											<input type="text" class="form-control number-separator" inputmode="numeric"
												pattern="[0-9]*" value="6">
											<input type="hidden" class="result-input" id="absent-day" value="6">
										</div>
									</div>
								</div>
							</div>

							<!-- Over Time Section -->
							<div class="overtime-field">
								<div class="card-title-head">
									<h6><span><i data-feather="info" class="feather-edit"></i></span>Over Time</h6>
								</div>
								<div class="row align-items-center">
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Regular Over Time</label>
										</div>
									</div>
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Over Time Hours</label>
											<input type="text" class="form-control number-separator" inputmode="numeric"
												pattern="[0-9]*" value="10">
											<input type="hidden" class="result-input" id="regular-over-time-hours"
												value="10">
										</div>
									</div>
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Over Time Rate</label>
											<input type="text" class="form-control number-separator" inputmode="numeric"
												pattern="[0-9]*" value="10">
											<input type="hidden" class="result-input" id="regular-over-time-hours"
												value="10">
										</div>
									</div>
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Amount</label>
											<input type="text" class="form-control number-separator" inputmode="numeric"
												pattern="[0-9]*" value="15000" disabled>
											<input type="hidden" class="result-input" id="regular-over-time-rate"
												value="15000">
										</div>
									</div>


								</div>
								<div class="row align-items-center">
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Special Over Time</label>
										</div>
									</div>
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Over Time Hours</label>
											<input type="text" class="form-control number-separator" inputmode="numeric"
												pattern="[0-9]*" value="0">
											<input type="hidden" class="result-input" id="special-over-time-hours"
												value="0">
										</div>
									</div>
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Over Time Rate</label>
											<input type="text" class="form-control number-separator" inputmode="numeric"
												pattern="[0-9]*" value="0">
											<input type="hidden" class="result-input" id="special-over-time-rate"
												value="0">
										</div>
									</div>
									<div class="col-md-3">
										<div class="mb-3">
											<label class="form-label">Amount</label>
											<input type="text" class="form-control number-separator" inputmode="numeric"
												pattern="[0-9]*" value="0">
											<input type="hidden" class="result-input" id="special-over-time-rate"
												value="0">
										</div>
									</div>
									

								</div>
							</div>

							<!-- Allowance Section -->
							<div class="allowance-field">
								<div class="card-title-head">
									<h6><span><i data-feather="info" class="feather-edit"></i></span>Allowance</h6>
								</div>
								<div class="row mb-3 align-items-center">
									<div class="col-md-6">
										<label class="form-label">Present Incentive</label>
									</div>
									<div class="col-md-6">
										<input type="text" class="form-control" value="20.000" disabled>
									</div>
								</div>

								<div class="col-md-12">
									<a class="text-primary add-item-btn d-block mb-3 fw-bold" href="#"
										data-item-type="allowance">+ Add Other
										Allowance</a>
									<template>
										<div class="dynamic-item mb-3 row align-items-center">
											<label class="form-label col-md-6">
												<span class="editable-label-view">
													<span class="editable-label-text form-label">Other Label</span>
													<a href="#" class="fst-italic text-primary ms-2"
														data-editable-action="edit">edit</a>
													<a href="#"
														class="fst-italic text-danger ms-2 remove-item-btn">remove</a>
												</span>
												<span class="editable-label-edit" style="display: none;">
													<span class="d-flex align-items-center">
														<input type="text"
															class="form-control form-control-sm d-inline-block me-2"
															data-editable-input value="${itemLabel}">
														<a href="#" class="fst-italic text-primary ms-2"
															data-editable-action="save">save</a>
														<a href="#" class="fst-italic text-secondary ms-2"
															data-editable-action="cancel">cancel</a>
													</span>
												</span>
											</label>
											<div class="col-md-6">
												<div class="row">
													<div class="col-md-4">
														<label class="form-label">Qty</label>
														<input type="text"
															class="form-control number-separator qty-input"
															inputmode="numeric" pattern="[0-9]*">
														<input type="hidden" class="result-input">
													</div>

													<div class="col-md-4">
														<label class="form-label">Rate</label>
														<input type="text"
															class="form-control number-separator rate-input"
															inputmode="numeric" pattern="[0-9]*">
														<input type="hidden" class="result-input">
													</div>

													<div class="col-md-4">
														<label class="form-label">Amount</label>
														<input type="text"
															class="form-control number-separator amount-input"
															inputmode="numeric" pattern="[0-9]*">
														<input type="hidden" class="result-input">
													</div>
												</div>
											</div>
										</div>
									</template>
									<div class="mb-3 row align-items-center">
										<label class="form-label col-md-6">
											<span class="editable-label-view" data-editable-name="presentAllowance">
												<span class="editable-label-text form-label">Pengiriman</span>
												<a href="#" class="fst-italic text-primary ms-2"
													data-editable-action="edit">edit</a>
											</span>
											<span class="editable-label-edit" style="display: none;">
												<span class="d-flex align-items-center">
													<input type="text"
														class="form-control form-control-sm d-inline-block me-2"
														data-editable-input value="Present Allowance">
													<a href="#" class="fst-italic text-primary ms-2"
														data-editable-action="save">save</a>
												</span>
											</span>
										</label>
										<div class="col-md-6">
											<div class="row">
												<div class="col-md-4">
													<label class="form-label">Qty</label>
													<input type="text" class="form-control number-separator qty-input"
														inputmode="numeric" pattern="[0-9]*" value="30">
													<input type="hidden" class="result-input" value="30">
												</div>

												<div class="col-md-4">
													<label class="form-label">Rate</label>
													<input type="text" class="form-control number-separator rate-input"
														inputmode="numeric" pattern="[0-9]*" value="30000">
													<input type="hidden" class="result-input" value="30000">
												</div>

												<div class="col-md-4">
													<label class="form-label">Amount</label>
													<input type="text"
														class="form-control number-separator amount-input"
														inputmode="numeric" pattern="[0-9]*" value="900000">
													<input type="hidden" class="result-input" value="900000">
												</div>
											</div>
										</div>
									</div>

									<!-- Container untuk dynamic items -->
									<div class="dynamic-items-container mb-3"></div>
								</div>
							</div>

							<!-- Deduction Section -->
							<div class="deduction-field">
								<div class="card-title-head">
									<h6><span><i data-feather="info" class="feather-edit"></i></span>Deduction</h6>
								</div>
								<div class="row mb-3 align-items-center">

									<div class="col-md-6">
										<label class="form-label">Cash Advance</label>
									</div>
									<div class="col-md-6">
										<div class="d-flex justify-content-between mb-2">
											<span class="text-primary">Total : 1.750.000</span>
											<span class="text-primary">Plan : 300.000</span>
										</div>
										<input type="text" class="form-control number-separator" inputmode="numeric"
											pattern="[0-9]*" value="300000">
										<input type="hidden" class="result-input" id="cash-advance" value="300000">
									</div>
								</div>
								<div class="col-md-12">
									<a class="text-primary add-item-btn d-block mb-3 fw-bold" href="#"
										data-item-type="deduction">+ Add Other
										Deduction</a>
									<template>
										<div class="dynamic-item mb-3 row align-items-center">
											<label class="form-label col-md-6">
												<span class="editable-label-view">
													<span class="editable-label-text form-label">Other Label</span>
													<a href="#" class="fst-italic text-primary ms-2"
														data-editable-action="edit">edit</a>
													<a href="#"
														class="fst-italic text-danger ms-2 remove-item-btn">remove</a>
												</span>
												<span class="editable-label-edit" style="display: none;">
													<span class="d-flex align-items-center">
														<input type="text"
															class="form-control form-control-sm d-inline-block me-2"
															data-editable-input value="${itemLabel}">
														<a href="#" class="fst-italic text-primary ms-2"
															data-editable-action="save">save</a>
														<a href="#" class="fst-italic text-secondary ms-2"
															data-editable-action="cancel">cancel</a>
													</span>
												</span>
											</label>
											<div class="col-md-6">
												<div class="row">
													<div class="col-md-4">
														<label class="form-label">Qty</label>
														<input type="text"
															class="form-control number-separator qty-input"
															inputmode="numeric" pattern="[0-9]*">
														<input type="hidden" class="result-input">
													</div>

													<div class="col-md-4">
														<label class="form-label">Rate</label>
														<input type="text"
															class="form-control number-separator rate-input"
															inputmode="numeric" pattern="[0-9]*">
														<input type="hidden" class="result-input">
													</div>

													<div class="col-md-4">
														<label class="form-label">Amount</label>
														<input type="text"
															class="form-control number-separator amount-input"
															inputmode="numeric" pattern="[0-9]*">
														<input type="hidden" class="result-input">
													</div>
												</div>
											</div>
										</div>
									</template>
									<div class="mb-3 row align-items-center">
										<label class="form-label col-md-6">
											<span class="editable-label-view" data-editable-name="presentAllowance">
												<span class="editable-label-text form-label">Other Deduction</span>
												<a href="#" class="fst-italic text-primary ms-2"
													data-editable-action="edit">edit</a>
											</span>
											<span class="editable-label-edit" style="display: none;">
												<span class="d-flex align-items-center">
													<input type="text"
														class="form-control form-control-sm d-inline-block me-2"
														data-editable-input value="Present Allowance">
													<a href="#" class="fst-italic text-primary ms-2"
														data-editable-action="save">save</a>
												</span>
											</span>
										</label>
										<div class="col-md-6">
											<div class="row">
												<div class="col-md-4">
													<label class="form-label">Qty</label>
													<input type="text" class="form-control number-separator qty-input"
														inputmode="numeric" pattern="[0-9]*" value="30">
													<input type="hidden" class="result-input" value="30">
												</div>

												<div class="col-md-4">
													<label class="form-label">Rate</label>
													<input type="text" class="form-control number-separator rate-input"
														inputmode="numeric" pattern="[0-9]*" value="30000">
													<input type="hidden" class="result-input" value="30000">
												</div>

												<div class="col-md-4">
													<label class="form-label">Amount</label>
													<input type="text"
														class="form-control number-separator amount-input"
														inputmode="numeric" pattern="[0-9]*" value="900000">
													<input type="hidden" class="result-input" value="900000">
												</div>
											</div>
										</div>
									</div>

									<!-- Container untuk dynamic items -->
									<div class="dynamic-items-container mb-3"></div>
								</div>

							</div>

							<!-- Summary Section -->
							<div class="summary-field border-top pt-4">
								<div class="row">
									<div class="col-lg-3 col-md-6">
										<div class="mb-3">
											<label class="form-label">Total Over Time</label>
											<input type="text" class="form-control" value="150.000" disabled>
										</div>
									</div>
									<div class="col-lg-3 col-md-6">
										<div class="mb-3">
											<label class="form-label">Total Allowance</label>
											<input type="text" class="form-control" value="250.000" disabled>
										</div>
									</div>
									<div class="col-lg-3 col-md-6">
										<div class="mb-3">
											<label class="form-label">Total Deduction (-)</label>
											<input type="text" class="form-control" value="300.000" disabled>
										</div>
									</div>
									<div class="col-lg-3 col-md-6">
										<div class="mb-3">
											<label class="form-label">Total Received</label>
											<input type="text" class="form-control" value="1.250.000" disabled>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>

					<div class="text-end mb-3">
						<button type="button" class="btn btn-cancel me-2">Reset</button>
						<button type="submit" class="btn btn-submit">Save</button>
					</div>
				</form>
			</div>
		</div>
	</div>
	<!-- /Main Wrapper -->

	<!-- jQuery -->
	<script src="assets/js/jquery-3.7.1.min.js"></script>

	<!-- Feather Icon JS -->
	<script src="assets/js/feather.min.js"></script>

	<!-- Slimscroll JS -->
	<script src="assets/js/jquery.slimscroll.min.js"></script>

	<!-- Datatable JS -->
	<script src="assets/js/jquery.dataTables.min.js"></script>
	<script src="assets/js/dataTables.bootstrap5.min.js"></script>

	<!-- Bootstrap Core JS -->
	<script src="assets/js/bootstrap.bundle.min.js"></script>

	<!-- Datetimepicker JS -->
	<script src="assets/js/moment.min.js"></script>
	<script src="assets/js/bootstrap-datetimepicker.min.js"></script>

	<!-- Separator -->
	<script src="assets/js/easy-number-separator.js"></script>

	<!-- Select2 JS -->
	<script src="assets/plugins/select2/js/select2.min.js"></script>

	<!-- Sweetalert 2 -->
	<script src="assets/plugins/sweetalert/sweetalert2.all.min.js"></script>
	<script src="assets/plugins/sweetalert/sweetalerts.min.js"></script>

	<!-- Live Search -->
	<script src="assets/js/liveSearch.js"></script>

	<!-- Add Input Field JS -->
	<script src="assets/js/add-input.js"></script>

	<!-- Custom JS -->
	<script src="assets/js/theme-script.js"></script>
	<script src="assets/js/script.js"></script>

</body>

</html>
