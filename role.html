    <script>
      $(document).ready(function () {
        // Initialize Feather Icons
        if (typeof feather !== "undefined") {
          feather.replace();
        }

        const $tableBody = $("#permissions-table-body");

        // Toggle Accordion (Expand/Collapse)
        $tableBody.on("click", ".toggle-btn", function (e) {
          e.stopPropagation();
          const group = $(this).data("target");
          const $icon = $(this).find(".transition-icon");
          const $childRows = $tableBody.find(`.child-row[data-parent="${group}"]`);
          const isOpen = $icon.hasClass("fa-chevron-down");

          if (isOpen) {
            $childRows.slideUp(200);
            $icon.removeClass("fa-chevron-down").addClass("fa-chevron-right");
          } else {
            $childRows.slideDown(200);
            $icon.removeClass("fa-chevron-right").addClass("fa-chevron-down");
          }
        });

        // Select All in Group
        $tableBody.on("change", ".select-all-group", function () {
          const group = $(this).data("group");
          const isChecked = $(this).is(":checked");
          $tableBody.find(`.child-cb[data-group="${group}"]`).prop("checked", isChecked);
        });

        // Update "Select All" when individual checkbox changes
        $tableBody.on("change", ".child-cb", function () {
          const group = $(this).data("group");
          const $allCheckboxes = $tableBody.find(`.child-cb[data-group="${group}"]`);
          const $checkedBoxes = $allCheckboxes.filter(":checked");
          const $selectAll = $tableBody.find(`.select-all-group[data-group="${group}"]`);

          if ($checkedBoxes.length === $allCheckboxes.length) {
            $selectAll.prop("checked", true).prop("indeterminate", false);
          } else if ($checkedBoxes.length > 0) {
            $selectAll.prop("checked", false).prop("indeterminate", true);
          } else {
            $selectAll.prop("checked", false).prop("indeterminate", false);
          }
        });

        // Search Functionality
        $("#permissionSearch").on("keyup", function () {
          const searchTerm = $(this).val().toLowerCase().trim();

          if (searchTerm === "") {
            // Reset: show all groups, restore original collapse state
            $(".group-header").show();
            $(".child-row").each(function () {
              const group = $(this).data("parent");
              const $icon = $(`.toggle-btn[data-target="${group}"]`).find(".transition-icon");
              if ($icon.hasClass("fa-chevron-down")) {
                $(this).show();
              } else {
                $(this).hide();
              }
            });
            return;
          }

          // Search logic
          $(".group-header").each(function () {
            const group = $(this).data("group");
            const $childRows = $(`.child-row[data-parent="${group}"]`);
            let hasMatch = false;

            // Check group header text
            const groupText = $(this).find("strong").text().toLowerCase();
            if (groupText.includes(searchTerm)) {
              hasMatch = true;
              $childRows.show();
            } else {
              // Check each child row
              $childRows.each(function () {
                const childText = $(this).find("td:first").text().toLowerCase();
                if (childText.includes(searchTerm)) {
                  hasMatch = true;
                  $(this).show();
                } else {
                  $(this).hide();
                }
              });
            }

            // Show/hide group header based on match
            if (hasMatch) {
              $(this).show();
              // Expand the group icon
              const $icon = $(`.toggle-btn[data-target="${group}"]`).find(".transition-icon");
              $icon.removeClass("fa-chevron-right").addClass("fa-chevron-down");
            } else {
              $(this).hide();
            }
          });
        });

        // Save Permissions
        $("#savePermissions").on("click", function () {
          const permissions = {};

          $(".child-row").each(function () {
            const group = $(this).data("parent");
            const pageName = $(this).find("td:first").text().trim();
            const checkboxes = $(this).find(".child-cb");

            if (!permissions[group]) {
              permissions[group] = [];
            }

            permissions[group].push({
              page: pageName,
              view: checkboxes.eq(0).is(":checked"),
              create: checkboxes.eq(1).is(":checked"),
              edit: checkboxes.eq(2).is(":checked"),
              delete: checkboxes.eq(3).is(":checked"),
            });
          });

          console.log("Permissions to save:", permissions);

          // Show success message
          if (typeof Swal !== "undefined") {
            Swal.fire({
              icon: "success",
              title: "Saved!",
              text: "Permissions have been saved successfully.",
              confirmButtonColor: "#3085d6",
            });
          } else {
            alert("Permissions saved successfully!");
          }
        });

        // Reset Permissions
        $("#resetPermissions").on("click", function () {
          if (typeof Swal !== "undefined") {
            Swal.fire({
              title: "Are you sure?",
              text: "This will reset all permissions!",
              icon: "warning",
              showCancelButton: true,
              confirmButtonColor: "#3085d6",
              cancelButtonColor: "#d33",
              confirmButtonText: "Yes, reset it!",
            }).then((result) => {
              if (result.isConfirmed) {
                resetAllPermissions();
                Swal.fire("Reset!", "All permissions have been reset.", "success");
              }
            });
          } else {
            if (confirm("Are you sure you want to reset all permissions?")) {
              resetAllPermissions();
            }
          }
        });

        function resetAllPermissions() {
          $(".child-cb").prop("checked", false);
          $(".select-all-group").prop("checked", false).prop("indeterminate", false);
        }
      });
    </script>
